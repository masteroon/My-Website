<!DOCTYPE html>

<html>
  <head>
    <title>
      Rock Paper Scissors
    </title>
    <link rel="stylesheet" href="/styles/10-rock-paper-scissors.css">
  </head>

  <body>
    <p class="title">
      Rock Paper Scissors
    </p>

    <button class= "move-button" onclick="
      playGame('rock');
    ">
      <img class="move-icon" src="/Icons/rock-emoji.png">
    </button>

    <button class ="move-button" onclick = "
      playGame('paper');
    ">
      <img class="move-icon" src="/Icons/paper-emoji.png">
    </button>

    <button class = "move-button" onclick = "
      playGame('scissors');
    ">
      <img class="move-icon" src="/Icons/scissors-emoji.png">
    </button>
    <p class="js-result result">

    </p>

    <p class="js-picks">
 
    </p>
    <p class = 'js-score score'>
    </p>
    <button class="reset-score-button" onclick="
      resetScore();
    ">
      Reset Score
    </button>

    <script src="/scripts/10-rock-paper-scissors.js"></script>
  </body>
</html>
