<!DOCTYPE html>

<html>
  <head>
    <title>
      Rock Paper Scissors
    </title>
    <link rel="stylesheet" href="./styles/12-rock-paper-scissors-r.css">
  </head>

  <body>
    <p class="title">
      Rock Paper Scissors
    </p>

    <button class= "move-button js-rock-button">
      <img class="move-icon" src="./Icons/rock-emoji.png">
    </button>

    <button class ="move-button js-paper-button">
      <img class="move-icon" src="./Icons/paper-emoji.png">
    </button>

    <p class="js-result result">

    </p>

    <p class="js-picks">
 
    </p>
    <p class = 'js-score score'>
    </p>

    <button class="auto-play-button js-auto-play-button">
      Auto Play
    </button>

    <div class="js-confirmation-message">

    </div>
