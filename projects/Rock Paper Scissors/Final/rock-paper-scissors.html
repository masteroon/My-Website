<!DOCTYPE html>

<html>
  <head>
    <title>
      Rock Paper Scissors
    </title>
    <link rel="stylesheet" href="./styles/rock-paper-scissors.css">
  </head>

  <body>
    <p class="title">
      Rock Paper Scissors
    </p>
    <div>
      <button class= "move-button js-rock-button">
        <img class="move-icon" src="./Icons/rock-emoji.png">
      </button>

      <button class ="move-button js-paper-button">
        <img class="move-icon" src="./Icons/paper-emoji.png">
      </button>

      <button class = "move-button js-scissors-button">
        <img class="move-icon" src="./Icons/scissors-emoji.png">
      </button>
    </div>

    <p class="js-result result">

    </p>

    <p class="js-picks">
 
    </p>
    <p class = 'js-score score'>
    </p>

    <div>
      <button class="reset-score-button js-reset-score-button">
        Reset Score
      </button>

      <button class="auto-play-button js-auto-play-button">
        Auto Play
      </button>
    </div>

    <div class="js-confirmation-message">

    </div>

    <script src="./scripts/rock-paper-scissors.js"></script>
  </body>
</html>
