<!DOCTYPE html>

<html>
  <head>
    <title>
      Rock Paper Scissors
    </title>
  </head>

  <body>
    <p>
      Rock Paper Scissors
    </p>

    <button onclick="
      playGame('rock');
    ">
      Rock
    </button>

    <button onclick = "
      playGame('paper');
    ">
      Paper
    </button>

    <button onclick = "
      playGame('scissors');
    ">
      Scissors
    </button>

    <script>

      function playGame(playerMove) {
        const computerMove = pickComputerMove();     
        if(computerMove === playerMove){
          result = 'Tie.';
        }

        else if (playerMove === 'rock'){
          if (computerMove === 'paper') {
            result = 'You lose.';
          }

          else {
            result = 'You win.';
          }
        }

        else if (playerMove === 'paper'){
          if (computerMove === 'scissors') {
            result = 'You lose.';
          }

          else {
            result = 'You win.';
          }
        }

        else if (playerMove === 'scissors'){
          if (computerMove === 'rock') {
            result = 'You lose.';
          }

          else {
            result = 'You win.';
          }
        }

        alert(`You picked ${playerMove}. Computer picked ${computerMove}. ${result}`);
      }

      function pickComputerMove() {
        const randomNumber = Math.random();
        let result = '';
        let computerMove = '';


        if (randomNumber < 1/3){
          computerMove ='rock';
        }

        else if (randomNumber >= 1/3 && randomNumber < 2/3 ){
          computerMove = 'paper';
        }

        else {
          computerMove = 'scissors';
        }

        return computerMove;

      }
    
    </script>
  </body>
</html>
