<!DOCTYPE html>

<html>
  <head>
    <title>
      Calculator
    </title>
    <link rel="stylesheet" href="./projects/Calculator/styles/calculator.css">

    <body>
      <p class="display js-display">

      </p>

      <p>
        <button class="number-button"
        onclick="
          updateCalculation('1');
          ">
          1
        </button>

        <button class="number-button"
        onclick="
          updateCalculation('2');
          ">
          2
        </button>

        <button class="number-button"
        onclick="
          updateCalculation('3');
          ">
          3
        </button>

        <button class="sign-button" onclick="
          updateCalculation(' + ');
          ">
          +
          </button>
      </p>

      <p>
        <button class="number-button"
        onclick="
          updateCalculation('4');
          ">
          4
        </button>

        <button class="number-button"
        onclick="
          updateCalculation('5');
          ">
          5
        </button>

        <button class="number-button"
        onclick="
          updateCalculation('6');
          ">
          6
        </button>

        <button class="sign-button"
        onclick="
          updateCalculation(' - ');
          ">
          -
          </button>
      </p>

   
      <p>
        <button class="number-button"
        onclick="
          updateCalculation('7');
          ">
          7
        </button>

        <button class="number-button"
        onclick="
          updateCalculation('8');
          ">
          8
        </button>

        <button class="number-button"
        onclick="
          updateCalculation('9');
          ">
          9
        </button>

        <button class="sign-button"
        onclick="
          updateCalculation(' * ');
          ">
          *
        </button>
      </p>

      <p>
        <button 
        class="number-button"
        onclick="
          updateCalculation('0');
          ">
          0
        </button>

         <button class="number-button"
         onclick="
          updateCalculation('.');
          ">
          .
        </button>

        <button class="number-button"
        onclick="
          calculation = eval(calculation);
          updateDisplay();
          updateLocalStorage('save','calculation', calculation);
          ">
          =
        </button>

        <button class="sign-button"
        onclick="
          updateCalculation(' / ');
          ">
          /
        </button>
      </p>

      <p>
        <button class="clear-button number-button"
        onclick="
          calculation = '';
          console.log('Cleared.');
          updateLocalStorage('remove','calculation');
          updateDisplay();
          ">
          Clear
        </button>
      </p>

      <script src="./projects/Calculator/scripts/calculator.js">
        
      </script>
    </body>
  </head>
</html>
