<!DOCTYPE html>

<html>
  <head>
    <title>
      Contact
    </title>
    <link rel="stylesheet" href="/Styles/general.css">
    <link rel="stylesheet" href="/Styles/header.css">
    <link rel="stylesheet" href="/Styles/contact.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&family=Roboto:ital,wght@0,100..900;1,100..900&family=Unlock&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Audiowide&display=swap" rel="stylesheet">
  </head>

  <body>
    <header class="header js-header"></header>
    <main class="contact-page"> 
      <div class="title-button-container">
        <p class="contact-page-title">
          Contact Me
        </p>
        
       
      </div>

      <div class="contact-buttons-container">
        <a href="https://wa.me/972542343457" target="_blank" class="contact-button">
          <img src="/Icons/Contact/whatsapp-neon.png" class="contact-button-image">
          <div class="contact-button-tooltip whatsapp-button-tooltip">WhatsApp</div>
        </a>
        <a href="tel:+972542343457" class="contact-button">
          <img src="/Icons/Contact/call-neon.png" class="contact-button-image">
          <div class="contact-button-tooltip phone-button-tooltip">Call Me</div>
        </a>
        <a href="mailto:oronbar0@gmail.com" class="contact-button">
          <img src="/Icons/Contact/email-neon.png" class="contact-button-image">
          <div class="contact-button-tooltip email-button-tooltip">Email Me</div>
        </a>
      </div>

      <form class="contact-form js-contact-form" novalidate>
        <div class="confirmation-message js-confirmation-message hidden">Message Sent!</div>

        <div class="contact-form-row">
          <label for="name">Name</label>
          <input type="text" id="name" name="name" placeholder="Your name" required>
          <div class="field-error js-name-error hidden">Please enter your name</div>
        </div>

        <div class="contact-form-row">
          <label for="email">Email</label>
          <input type="email" id="email" name="email" placeholder="Your email" required>
          <div class="field-error js-email-error hidden">Please enter a valid email</div>
        </div>

        <div class="contact-form-row">
          <label for="message">Message</label>
          <textarea id="message" name="message" placeholder="Write your message here" required></textarea>
          <div class="field-error js-message-error hidden">Please enter a message</div>
        </div>

        <div class="contact-form-row">
          <button type="submit" class="contact-submit-btn js-contact-submit-btn">Send Message</button>
        </div>
      </form>
       
  
      

    </main>

    <script src="https://cdn.jsdelivr.net/npm/emailjs-com@3/dist/email.min.js"></script>
    <script type="module" src="/scripts/contact.js"></script>
  </body>

</html>
